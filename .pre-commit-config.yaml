# Pre-commit hooks for Python development

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright
        entry: uv run basedpyright
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: Run tests
        entry: uv run pytest tests/ -x -q --ignore=tests/benchmark
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
