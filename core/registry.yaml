    intent: Automatic pattern extraction from sessions with confidence scoring.
    trigger_mode: suggest
    priority: P1
    supported_targets:
      claude-code: native-skill
      opencode: native-skill
    requires_tools:
      - Read
      - Write
      - Bash
    safety_level: trusted_builtin

  # External Superpowers skill pack (conditional on installation)
