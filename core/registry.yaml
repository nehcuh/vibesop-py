schema_version: 1
status: phase-6-buildable

_templates:
  superpowers_base: &superpowers_base
    namespace: superpowers
    entrypoint: external
    priority: P2
    supported_targets:
      claude-code: external-skill
      opencode: external-skill
    safety_level: external_reviewed
    conditional: superpowers_installed

  gstack_base: &gstack_base
    namespace: gstack
    entrypoint: external
    priority: P2
    supported_targets:
      claude-code: external-skill
      opencode: external-skill
    safety_level: external_reviewed
    conditional: gstack_installed

namespaces:
  builtin:
    owner: repository
    default_trust: reviewed
    purpose: Core workflow skills maintained in this repo.

  superpowers:
    owner: external_skill_pack
    default_trust: review_required
    purpose: Third-party skill packs such as Superpowers that extend the built-in workflow.

  gstack:
    owner: external_skill_pack
    default_trust: review_required
    purpose: Virtual engineering team — role-based skills for product thinking, code review, browser QA, and release automation.

  project:
    owner: project_maintainer
    default_trust: local_review
    purpose: Project-specific skills layered on top of builtin or external packs.

  omx:
    owner: oh-my-codex
    default_trust: reviewed
    purpose: oh-my-codex engineering methodologies — deep-interview, ralph, ralplan, team, ultrawork, autopilot, ultraqa.

merge_policy:
  precedence:
    - builtin
    - superpowers
    - gstack
    - project
  name_collision: require_namespace_or_explicit_alias
  default_external_trigger_mode: suggest
  mandatory_external_security_review: true

# Conflict resolution strategies for overlapping skills
conflict_resolution:
  enabled: true
  source: .vibe/skill-routing.yaml

  strategies:
    # Debugging: builtin systematic-debugging is P0 mandatory, always primary
    - scenario: debugging
      primary: systematic-debugging
      primary_source: builtin
      alternatives:
        - skill: /investigate
          source: gstack
          trigger: "需要自动 freeze 作用域"
        - skill: /systematic-debugging
          source: superpowers
          trigger: "需要高级调试工作流"
      override_keywords:
        - "用 gstack"
        - "用 superpowers"

    # Code review: prefer gstack for pre-landing (SQL safety, auto-fixes)
    - scenario: code_review
      primary: /review
      primary_source: gstack
      alternatives:
        - skill: /receiving-code-review
          source: superpowers
          trigger: "需要全面质量检查"
        - skill: /codex
          source: gstack
          trigger: "需要跨模型审查"
      override_keywords:
        - "用 superpowers"

    # Product thinking: gstack for early (reframing), superpowers for refinement
    - scenario: product_thinking
      primary: /office-hours
      primary_source: gstack
      alternatives:
        - skill: /brainstorming
          source: superpowers
          trigger: "需要设计细化"
      override_keywords:
        - "用 superpowers"

    # Planning: builtin default, gstack for specific angles
    - scenario: planning
      primary: planning-with-files
      primary_source: builtin
      alternatives:
        - skill: /plan-ceo-review
          source: gstack
          trigger: "CEO/产品角度"
        - skill: /plan-eng-review
          source: gstack
          trigger: "架构技术角度"
        - skill: /plan-design-review
          source: gstack
          trigger: "设计/UX 角度"
        - skill: /autoplan
          source: gstack
          trigger: "完整自动审查"
        - skill: /writing-plans
          source: superpowers
          trigger: "创建设计文档"
      override_keywords:
        - "用 gstack"
        - "用 superpowers"

    # Refactoring: prefer superpowers
    - scenario: refactoring
      primary: /refactor
      primary_source: superpowers
      alternatives:
        - skill: /review
          source: gstack
          trigger: "重构后审查"
      override_keywords:
        - "用 gstack"

    # Architecture: prefer superpowers
    - scenario: architecture
      primary: /writing-plans
      primary_source: superpowers
      alternatives:
        - skill: /plan-eng-review
          source: gstack
          trigger: "架构审查"
      override_keywords:
        - "用 gstack"

    # Requirements clarification: omx/deep-interview is primary
    - scenario: requirements_clarification
      primary: omx/deep-interview
      primary_source: omx
      alternatives:
        - skill: gstack/office-hours
          source: gstack
          trigger: "产品头脑风暴"
        - skill: superpowers/brainstorm
          source: superpowers
          trigger: "设计细化"

    # Persistent execution: omx/ralph is primary
    - scenario: persistent_execution
      primary: omx/ralph
      primary_source: omx
      alternatives:
        - skill: riper-workflow
          source: builtin
          trigger: "5 阶段开发"

    # Structured planning: omx/ralplan is primary
    - scenario: structured_planning
      primary: omx/ralplan
      primary_source: omx
      alternatives:
        - skill: planning-with-files
          source: builtin
          trigger: "文件规划"
        - skill: gstack/plan-eng-review
          source: gstack
          trigger: "架构审查"

    # Parallel execution: omx/team is primary
    - scenario: parallel_execution
      primary: omx/team
      primary_source: omx
      alternatives:
        - skill: omx/ultrawork
          source: omx
          trigger: "纯并行执行"
        - skill: using-git-worktrees
          source: builtin
          trigger: "工作树隔离"

    # QA cycling: omx/ultraqa is primary
    - scenario: qa_cycling
      primary: omx/ultraqa
      primary_source: omx
      alternatives:
        - skill: gstack/qa
          source: gstack
          trigger: "浏览器测试"
        - skill: gstack/qa-only
          source: gstack
          trigger: "仅报告"

# Skill detection and routing hints
routing_hints:
  # When user mentions these keywords, suggest specific skills
  suggestions:
    - keywords: ["发布", "提交", "ship", "merge", "PR"]
      suggest: gstack/ship
      message: "检测到发布意图，建议使用 /ship"

    - keywords: ["测试网站", "QA", "端到端", "浏览器测试"]
      suggest: gstack/qa
      message: "建议使用 /qa 进行浏览器测试"

    - keywords: ["bug", "错误", "调试", "不工作", "卡住了"]
      suggest: builtin/systematic-debugging
      message: "建议先找根因再修复"

    - keywords: ["复杂", "很多文件", "麻烦"]
      suggest: builtin/planning-with-files
      message: "复杂任务建议先制定详细计划"

    - keywords: ["实验", "优化", "迭代", "autonomous", "experiment", "循环优化", "自主实验"]
      suggest: builtin/autonomous-experiment
      message: "建议使用自主实验循环进行优化"

    - keywords: ["新功能", "新想法", "feature", "要不要做"]
      suggest: gstack/office-hours
      message: "新想法建议先用 /office-hours 重新框定问题"

external_pack_template:
  namespace_examples:
    - superpowers/tdd
    - superpowers/brainstorm
    - gstack/office-hours
    - gstack/review
    - project/domain-audit
  onboarding_rules:
    - Register metadata here before enabling triggers.
    - Start new external skills in suggest or manual mode.
    - Run the skill security audit before first use.

skills:
