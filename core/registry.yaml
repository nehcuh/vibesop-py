    trigger_mode: manual

  - id: superpowers/review
    <<: *superpowers_base
    intent: Code review with comprehensive quality checks.
    trigger_mode: suggest

  - id: superpowers/optimize
    <<: *superpowers_base
    intent: Performance optimization and profiling guidance.
    trigger_mode: manual

  # External gstack skill pack (conditional on installation)
  # Sprint pipeline: Think → Plan → Build → Review → Test → Ship → Reflect
  - id: gstack/office-hours
    <<: *gstack_base
    intent: Product brainstorming with forcing questions — reframes problems before code is written.
    trigger_mode: suggest

  - id: gstack/plan-ceo-review
