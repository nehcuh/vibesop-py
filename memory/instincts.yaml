instincts:
  - id: "550e8400-doc-reorg-2026"
    pattern: "当重组项目文档时，先分析并分类文件，使用 `git mv` 保留版本历史，然后创建索引文档，最后更新所有交叉引用并提交推送。"
    confidence: 0.88
    source_sessions: ["vibesop-py-doc-reorg-2026-04-19"]
    usage_count: 11
    success_rate: 1.0
    tags: ["documentation", "refactoring", "git-workflow", "project-organization"]
    status: "active"
    context: |
      适用场景：
      - 项目根目录有大量文档文件（>10个）
      - 已存在逻辑分类目录（如 docs/, guides/, dev/）
      - 需要保持版本历史和跟踪变更

      关键步骤：
      1. 分析根目录和子目录的文件结构
      2. 按用途分类：用户文档、开发者文档、架构文档
      3. 使用 git mv 移动文件（保留历史）
      4. 创建 INDEX.md 作为中心导航
      5. 更新 README.md 和其他入口文档的引用
      6. 提交变更并推送

      成功指标：
      - 所有文件移动成功
      - 版本历史完整保留
      - 无失效的交叉引用
    created_at: "2026-04-19"
    last_used: "2026-04-19"

  - id: "550e8401-index-creation-2026"
    pattern: "当文档超过 10 个文件时，创建 INDEX.md 作为中心导航，按角色（用户/开发者/贡献者）和用途分类，并提供快速查找指南和维护指南。"
    confidence: 0.82
    source_sessions: ["vibesop-py-doc-reorg-2026-04-19"]
    usage_count: 1
    success_rate: 1.0
    tags: ["documentation", "organization", "ux", "navigation"]
    status: "active"
    context: |
      适用场景：
      - 单个目录包含 >10 个文档文件
      - 需要按不同角色提供文档视图
      - 新团队成员难以找到相关文档

      INDEX.md 应包含：
      1. 按角色分类的快速导航
      2. 完整的文档目录结构
      3. 快速链接部分（按类别）
      4. 维护指南和审查计划
      5. 外部资源链接

      最佳实践：
      - 使用表情符号增强可读性
      - 提供多种导航方式（角色、类别、字母）
      - 包含"最后更新"时间戳
      - 添加维护指南确保文档持续更新
    created_at: "2026-04-19"
    last_used: "2026-04-19"

  - id: "550e8402-crossref-update-2026"
    pattern: "移动文档文件后，立即检查并更新所有相关文件中的交叉引用，特别是 README.md 和其他入口文档，确保所有链接指向新路径。"
    confidence: 0.78
    source_sessions: ["vibesop-py-doc-reorg-2026-04-19"]
    usage_count: 2
    success_rate: 1.0
    tags: ["refactoring", "maintenance", "documentation", "quality-assurance"]
    status: "active"
    context: |
      适用场景：
      - 文件位置发生变化（移动、重命名）
      - 文档间存在相互引用
      - 需要保持文档可访问性

      关键步骤：
      1. 移动文件后立即搜索所有引用
      2. 优先更新入口文档（README.md）
      3. 使用精确替换（避免过度替换）
      4. 验证更新后的链接
      5. 检查是否有遗漏的引用

      工具使用：
      - 使用 Edit 工具进行精确替换
      - 设置 replace_all=false 避免全局替换
      - 使用 grep 搜索可能的引用
      - 读取文件验证更新成功

      验证检查：
      - 所有 README.md 文件
      - docs/README.md
      - 其他入口文档
      - CI/CD 配置文件中的文档链接
    created_at: "2026-04-19"
    last_used: "2026-04-19"

  - id: "550e8403-bare-except-narrowing-2026"
    pattern: "清理裸 `except Exception` 时，先用 grep 找出所有位置，逐个分析上下文后替换为具体异常类型，最后运行完整测试套件验证。"
    confidence: 0.92
    source_sessions: ["vibesop-py-code-review-2026-04-21"]
    usage_count: 1
    success_rate: 1.0
    tags: ["code-quality", "exception-handling", "refactoring", "testing"]
    status: "active"
    context: |
      适用场景：
      - 代码库中存在大量裸 `except Exception`
      - 需要提高异常处理的精确性和可调试性
      - 代码审查指出此问题

      关键步骤：
      1. 用 grep 找出所有裸 except 位置（包括 `except:` 和 `except Exception:`）
      2. 逐个读取上下文，确定可能抛出的异常类型
      3. 替换为具体异常元组，优先包含自定义异常类
      4. 特别注意第三方库的异常（如 ruamel.yaml.YAMLError）
      5. 运行完整测试套件（不只是修改的文件）
      6. 修复因异常收窄导致的测试失败

      常见映射：
      - 文件 I/O → (OSError, FileNotFoundError)
      - JSON 解析 → json.JSONDecodeError
      - YAML 解析 → ruamel.yaml.YAMLError
      - 导入/反射 → ImportError
      - 网络 → (ConnectionError, TimeoutError)
      - 自定义异常 → 显式加入捕获元组

      陷阱：
      - 自定义异常不继承 ValueError/TypeError，容易遗漏
      - 第三方库的异常层次需要查阅文档
      - 集成测试往往才能发现遗漏的异常类型
    created_at: "2026-04-21"
    last_used: "2026-04-21"

  - id: "550e8404-god-function-split-2026"
    pattern: "当遇到超过 150 行的 God function 时，按职责边界拆分为 3-5 个专注函数，保留原函数作为协调器，消除重复代码块。"
    confidence: 0.90
    source_sessions: ["vibesop-py-code-review-2026-04-21"]
    usage_count: 1
    success_rate: 1.0
    tags: ["refactoring", "code-quality", "function-design", "readability"]
    status: "active"
    context: |
      适用场景：
      - 单个函数超过 150 行，处理多个职责
      - 函数内部有多个独立的逻辑分支（渲染、验证、交互）
      - 代码审查指出可读性问题

      拆分策略：
      1. 识别函数内的独立职责区块（如：条件判断、渲染、交互、格式化）
      2. 每个职责提取为一个命名清晰的函数
      3. 原函数保留为协调器（controller），按顺序调用子函数
      4. 消除重复代码（如本例中重复的 validation 块）
      5. 子函数接收所需参数，不依赖外部隐式状态

      命名约定：
      - 条件判断：`_needs_<action>()` → 返回 bool
      - 交互流程：`_run_<flow>()` → 执行副作用
      - 渲染输出：`_render_<type>()` → 输出到 console
      - 格式化：`_format_<thing>()` → 返回字符串/数据结构

      验证：
      - 拆分后运行完整测试套件
      - 确保没有行为变更（纯重构）
      - 检查是否有遗漏的局部变量依赖
    created_at: "2026-04-21"
    last_used: "2026-04-21"
